<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - SmartCinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/scbs.css}" rel="stylesheet">
</head>
<body class="admin-page">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 cinema-navbar">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/}">Smart<span>Cinema</span> Admin</a>
        <div class="ms-auto d-flex text-white align-items-center">
            <span class="me-3">Xin chào, <b sec:authentication="name"></b>!</span>
            <a th:href="@{/}" class="btn btn-sm btn-outline-light me-2">Ra trang chủ</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-sm btn-danger" type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<main class="container admin-shell">
    <div class="row">
        <aside class="col-lg-3 mb-3 mb-lg-0 admin-sidebar">
            <div class="list-group admin-panel">
                <a href="#" class="list-group-item list-group-item-action active">Bảng điều khiển</a>
                <a th:href="@{/admin/movies}" class="list-group-item list-group-item-action">Quản lý phim</a>
                <a th:href="@{/admin/showtimes}" class="list-group-item list-group-item-action">Quản lý suất chiếu</a>
                <a href="#" class="list-group-item list-group-item-action">Báo cáo doanh thu</a>
            </div>
        </aside>

        <section class="col-lg-9">
            <div class="card admin-panel">
                <div class="card-header">Tổng quan hệ thống</div>
                <div class="card-body">
                    <h5 class="card-title">Chào mừng quản trị viên</h5>
                    <p class="card-text text-muted">Theo dõi dữ liệu vận hành và thao tác nhanh với phim, lịch chiếu.</p>

                    <div class="row mt-4">
                        <div class="col-md-4 mb-3 mb-md-0">
                            <div class="card text-center admin-panel h-100">
                                <div class="card-body">
                                    <h3 class="card-title text-success" th:text="${movieCount}">0</h3>
                                    <p class="card-text">Phim đang chiếu</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3 mb-md-0">
                            <div class="card text-center admin-panel h-100">
                                <div class="card-body">
                                    <h3 class="card-title text-info" th:text="${todayShowtimeCount}">0</h3>
                                    <p class="card-text">Suất chiếu hôm nay</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-center admin-panel h-100">
                                <div class="card-body">
                                    <h3 class="card-title text-warning" th:text="${confirmedRevenue}">0 VND</h3>
                                    <p class="card-text">Doanh thu đã xác nhận</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
</body>
</html>
