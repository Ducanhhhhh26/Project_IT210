<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin phim - SmartCinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/scbs.css}" rel="stylesheet">
</head>
<body class="admin-page">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 cinema-navbar">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/}">Smart<span>Cinema</span> Admin</a>
        <div class="ms-auto d-flex text-white align-items-center">
            <a th:href="@{/admin/movies}" class="btn btn-sm btn-outline-light">Danh sách phim</a>
        </div>
    </div>
</nav>

<main class="container admin-shell">
    <div class="card admin-panel p-4">
        <h2 class="mb-4" th:text="${movie.id == null ? 'Thêm phim mới' : 'Cập nhật phim'}">Thêm phim mới</h2>
        <form th:action="@{/admin/movies/save}" th:object="${movie}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Tên phim</label>
                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''" th:field="*{title}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Thể loại</label>
                <select class="form-select" th:field="*{genre.id}">
                    <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.name}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Thời lượng (phút)</label>
                <input type="number" class="form-control" th:classappend="${#fields.hasErrors('duration')} ? 'is-invalid' : ''" th:field="*{duration}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('duration')}" th:errors="*{duration}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Ngày phát hành</label>
                <input type="date" class="form-control" th:classappend="${#fields.hasErrors('releaseDate')} ? 'is-invalid' : ''" th:field="*{releaseDate}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('releaseDate')}" th:errors="*{releaseDate}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Đường dẫn Poster (URL)</label>
                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('posterUrl')} ? 'is-invalid' : ''" th:field="*{posterUrl}" placeholder="https://example.com/poster.jpg">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('posterUrl')}" th:errors="*{posterUrl}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Mô tả</label>
                <textarea class="form-control" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''" th:field="*{description}" rows="4"></textarea>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>

            <button type="submit" class="btn btn-success">Lưu phim</button>
            <a th:href="@{/admin/movies}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</main>
</body>
</html>
