<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông tin Phim - SCBS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="/">🎬 Smart Cinema System</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h2 class="mb-4" th:text="${movie.id == null ? 'Thêm Phim Mới' : 'Cập nhật Phim'}">Thêm Phim Mới</h2>
        <form th:action="@{/admin/movies/save}" th:object="${movie}" method="post">
            <input type="hidden" th:field="*{id}" />
            <div class="mb-3">
                <label class="form-label">Tên Phim</label>
                <input type="text" class="form-control" th:field="*{title}" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Thể loại</label>
                <select class="form-select" th:field="*{genre.id}">
                    <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.name}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Thời lượng (phút)</label>
                <input type="number" class="form-control" th:field="*{duration}" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Ngày phát hành</label>
                <input type="date" class="form-control" th:field="*{releaseDate}" />
            </div>
            <div class="mb-3">
                <label class="form-label">Mô tả</label>
                <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-success">Lưu Phim</button>
            <a th:href="@{/admin/movies}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</body>
</html>
