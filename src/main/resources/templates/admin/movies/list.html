<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Phim - SCBS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/scbs.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="/">🎬 Smart Cinema System</a>
            <div class="ms-auto d-flex text-white align-items-center">
                <a th:href="@{/admin/dashboard}" class="btn btn-sm btn-outline-light me-2">Quay lại Dashboard</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2 class="mb-4">Danh sách Phim</h2>
        <a th:href="@{/admin/movies/create}" class="btn btn-primary mb-3">+ Thêm Phim Mới</a>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên Phim</th>
                    <th>Thời lượng (phút)</th>
                    <th>Ngày phát hành</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="movie : ${movies}">
                    <td th:text="${movie.id}"></td>
                    <td th:text="${movie.title}"></td>
                    <td th:text="${movie.duration}"></td>
                    <td th:text="${movie.releaseDate}"></td>
                    <td>
                        <a th:href="@{/admin/movies/edit/{id}(id=${movie.id})}" class="btn btn-sm btn-warning">Sửa</a>
                        <a th:href="@{/admin/movies/delete/{id}(id=${movie.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
