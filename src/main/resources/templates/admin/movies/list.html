<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Quản lý phim - SmartCinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/scbs.css}" rel="stylesheet">
</head>
<body class="admin-page">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 cinema-navbar">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/}">Smart<span>Cinema</span> Admin</a>
        <div class="ms-auto d-flex text-white align-items-center">
            <a th:href="@{/admin/dashboard}" class="btn btn-sm btn-outline-light me-2">Dashboard</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-sm btn-danger" type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<main class="container admin-shell">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
        <h2 class="mb-0">Danh sách phim</h2>
        <a th:href="@{/admin/movies/create}" class="btn btn-primary">Thêm phim mới</a>
    </div>

    <div class="card admin-panel p-3">
        <table class="table table-bordered table-striped mb-0">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên phim</th>
                <th>Thời lượng (phút)</th>
                <th>Ngày phát hành</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="movie : ${movies}">
                <td th:text="${movie.id}"></td>
                <td th:text="${movie.title}"></td>
                <td th:text="${movie.duration}"></td>
                <td th:text="${movie.releaseDate}"></td>
                <td>
                    <a th:href="@{/admin/movies/edit/{id}(id=${movie.id})}" class="btn btn-sm btn-warning me-1">Sửa</a>
                    <a th:href="@{/admin/movies/delete/{id}(id=${movie.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc chắn muốn xóa?')">Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
