<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm suất chiếu - SmartCinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/scbs.css}" rel="stylesheet">
</head>
<body class="admin-page">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 cinema-navbar">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/}">Smart<span>Cinema</span> Admin</a>
        <div class="ms-auto d-flex text-white align-items-center">
            <a th:href="@{/admin/showtimes}" class="btn btn-sm btn-outline-light">Danh sách suất chiếu</a>
        </div>
    </div>
</nav>

<main class="container admin-shell">
    <div class="card admin-panel p-4">
        <h2 class="mb-4">Thêm suất chiếu mới</h2>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/admin/showtimes/save}" th:object="${showtime}" method="post">
            <div class="mb-3">
                <label class="form-label">Phim</label>
                <select class="form-select" th:field="*{movie.id}" required>
                    <option th:each="m : ${movies}" th:value="${m.id}" th:text="${m.title}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Phòng</label>
                <select class="form-select" th:field="*{room.id}" required>
                    <option th:each="r : ${rooms}" th:value="${r.id}" th:text="${r.name} + ' (Sức chứa: ' + ${r.capacity} + ')'"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Thời gian bắt đầu</label>
                <input type="datetime-local" class="form-control" th:classappend="${#fields.hasErrors('startTime')} ? 'is-invalid' : ''" th:field="*{startTime}">
                <div class="invalid-feedback" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}"></div>
            </div>

            <button type="submit" class="btn btn-success">Lưu suất chiếu</button>
            <a th:href="@{/admin/showtimes}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</main>
</body>
</html>
