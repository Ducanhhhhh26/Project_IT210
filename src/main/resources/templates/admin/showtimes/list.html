<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý suất chiếu - SmartCinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/scbs.css}" rel="stylesheet">
</head>
<body class="admin-page">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 cinema-navbar">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/}">Smart<span>Cinema</span> Admin</a>
        <div class="ms-auto d-flex text-white align-items-center">
            <a th:href="@{/admin/dashboard}" class="btn btn-sm btn-outline-light me-2">Dashboard</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-sm btn-danger" type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<main class="container admin-shell">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
        <h2 class="mb-0">Danh sách suất chiếu</h2>
        <a th:href="@{/admin/showtimes/create}" class="btn btn-primary">Thêm suất chiếu</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="card admin-panel p-3">
        <table class="table table-bordered table-striped mb-0">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Phim</th>
                <th>Phòng</th>
                <th>Bắt đầu</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${showtimes}">
                <td th:text="${s.id}"></td>
                <td th:text="${s.movie.title}"></td>
                <td th:text="${s.room.name}"></td>
                <td th:text="${#temporals.format(s.startTime, 'dd/MM/yyyy HH:mm')}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
