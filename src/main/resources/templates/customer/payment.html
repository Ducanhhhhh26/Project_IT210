<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán - SCBS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/scbs.css}" rel="stylesheet">
</head>
<body class="booking-page">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 cinema-navbar">
    <div class="container">
        <a class="navbar-brand font-weight-bold" href="/">Smart<span>Cinema</span></a>
    </div>
</nav>

<main class="container booking-shell">
    <div class="row justify-content-center">
        <section class="col-lg-8">
            <div class="card booking-card">
                <div class="card-header">
                    <h5 class="mb-0">Thanh toán đơn vé #<span th:text="${booking.id}"></span></h5>
                </div>
                <div class="card-body">
                    <p class="booking-meta mb-2">
                        Mã đơn hàng:
                        <b th:text="${@bookingService.toBookingCode(booking.id)}"></b>
                    </p>
                    <p class="booking-meta mb-2">
                        Trạng thái:
                        <b th:text="${booking.status}"></b>
                    </p>
                    <p class="mb-2">
                        Phim:
                        <b th:text="${booking.tickets[0].showtime.movie.title}"></b>
                    </p>
                    <p class="mb-2">
                        Suất chiếu:
                        <b th:text="${#temporals.format(booking.tickets[0].showtime.startTime, 'dd/MM/yyyy HH:mm')}"></b>
                        <span th:text="${' | ' + booking.tickets[0].showtime.room.name}"></span>
                    </p>
                    <p class="mb-2">
                        Ghế:
                        <b th:text="${#strings.listJoin(booking.tickets.![seat.seatName], ', ')}"></b>
                    </p>
                    <p class="mb-3">
                        Tổng tiền:
                        <b class="text-danger" th:text="${#numbers.formatInteger(booking.totalPrice, 1, 'POINT') + ' VND'}"></b>
                    </p>

                    <form th:if="${booking.status.name() == 'PENDING'}"
                          th:action="@{/booking/{id}/payment/confirm(id=${booking.id})}"
                          method="post">
                        <button type="submit" class="btn btn-success w-100">Xác nhận thanh toán</button>
                    </form>

                    <div th:if="${booking.status.name() != 'PENDING'}" class="alert alert-success mb-0" id="success-alert">
                        Đơn vé đã được thanh toán. Thông tin đang được gửi qua email...

                        <!-- Nhúng thư viện EmailJS -->
                        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
                        <script th:inline="javascript">
                            /*<![CDATA[*/
                            (function() {
                                emailjs.init("hUKSeeh0dXYKRoFmn");

                                const serviceID = 'service_bq78asa';
                                const templateID = 'template_tsjqkqe'; // Trả lại Template ID gốc khớp với chữ hiển thị trên màn hình emailJS

                                const userData = {
                                    name: /*[[${booking.user != null ? booking.user.fullName : booking.user.username}]]*/ 'Khách hàng',
                                    email: /*[[${booking.user != null ? booking.user.email : ''}]]*/ 'khach@gmail.com',
                                    orderId: /*[[${@bookingService.toBookingCode(booking.id)}]]*/ 'Mã đơn',
                                    type: /*[[${#lists.isEmpty(booking.tickets) ? 'N/A' : booking.tickets[0].showtime.movie.title}]]*/ 'Tên Phim',
                                    seats: /*[[${#strings.listJoin(booking.tickets.![seat.seatName], ', ')}]]*/ 'Ghế ngồi',
                                    time: /*[[${#lists.isEmpty(booking.tickets) ? 'N/A' : #temporals.format(booking.tickets[0].showtime.startTime, 'dd/MM/yyyy HH:mm')}]]*/ 'Thời gian',
                                    price: /*[[${#numbers.formatInteger(booking.totalPrice, 1, 'POINT') + ' VND'}]]*/ '0 VND'
                                };

                                const sentFlag = 'email_sent_' + userData.orderId;
                                if (userData.email && !sessionStorage.getItem(sentFlag)) {
                                    const templateParams = {
                                        user_name: userData.name,
                                        email: userData.email,
                                        ticket_id: userData.orderId,
                                        ticket_type: userData.type,
                                        ticket_seats: userData.seats, // Gửi danh sách ghế lên EmailJS
                                        appointment_time: userData.time,
                                        total_price: userData.price
                                    };

                                    emailjs.send(serviceID, templateID, templateParams)
                                        .then((response) => {
                                            console.log('SUCCESS!', response.status, response.text);
                                            sessionStorage.setItem(sentFlag, 'true');
                                            document.getElementById('success-alert').innerHTML = 'Gửi email thành công!';
                                        }, (error) => {
                                            console.error('FAILED...', error);
                                        });
                                }
                            })();
                            /*]]>*/
                        </script>
                    </div>

                    <a th:href="@{/profile}" class="btn btn-secondary w-100 mt-3">Về hồ sơ</a>
                </div>
            </div>
        </section>
    </div>

</main>
</body>
</html>
