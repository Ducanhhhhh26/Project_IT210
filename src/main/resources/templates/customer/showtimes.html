<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Suất Chiếu - SCBS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/scbs.css}" rel="stylesheet">
</head>
<body class="booking-page">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 cinema-navbar">
    <div class="container">
        <a class="navbar-brand font-weight-bold" href="/">Smart<span>Cinema</span></a>
    </div>
</nav>
<main class="container booking-shell">
    <h3 class="mb-4 booking-heading">Chọn suất chiếu cho phim: <span th:text="${movie.title}" class="text-danger"></span></h3>
    <div class="row">
        <div th:if="${#lists.isEmpty(showtimeList)}" class="alert alert-warning booking-alert">
            Phim này hiện chưa có lịch chiếu hoặc các suất chiếu đã trôi qua.
        </div>

        <div class="col-md-4 mb-4" th:each="stMap : ${showtimeList}">
            <div th:class="${stMap.soldOut ? 'card h-100 booking-card booking-card-soldout' : 'card h-100 booking-card'}">
                <div class="card-body">
                    <h5 class="card-title text-danger">
                        <b th:text="${#temporals.format(stMap.showtime.startTime, 'dd/MM/yyyy')}"></b>
                    </h5>
                    <h4 class="font-weight-bold" th:text="${#temporals.format(stMap.showtime.startTime, 'HH:mm')}"></h4>
                    <p class="card-text booking-meta">
                        Phòng: <span th:text="${stMap.showtime.room.name}"></span><br>
                        Ghế trống: <span th:text="${stMap.availableSeats}"></span>/<span th:text="${stMap.showtime.room.capacity}"></span>
                    </p>

                    <div th:if="${stMap.soldOut}">
                        <button class="btn btn-outline-danger w-100" disabled>Hết vé</button>
                        <a th:href="@{/showtimes/{id}/seats(id=${stMap.showtime.id})}" class="btn btn-link w-100 mt-2 booking-link">Xem sơ đồ ghế</a>
                    </div>
                    <div th:unless="${stMap.soldOut}">
                        <a th:href="@{/showtimes/{id}/seats(id=${stMap.showtime.id})}" class="btn btn-primary w-100">Đặt ghế</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <a th:href="@{/}" class="btn btn-secondary mt-2">Quay lại danh sách phim</a>
</main>
</body>
</html>
