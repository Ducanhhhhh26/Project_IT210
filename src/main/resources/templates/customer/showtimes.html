<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Suất Chiếu - SCBS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand font-weight-bold" href="/">🎬 Smart Cinema System</a>
        </div>
    </nav>
    <div class="container mt-4">
        <h3 class="mb-4">Chọn Suất chiếu cho phim: <span th:text="${movie.title}" class="text-primary"></span></h3>
        <div class="row">
            <!-- Alert nếu không có suất chiếu -->
            <div th:if="${#lists.isEmpty(showtimeList)}" class="alert alert-warning">
                Bộ phim này hiện chưa có lịch chiếu hoặc các suất chiếu đã trôi qua.
            </div>

            <div class="col-md-4 mb-4" th:each="stMap : ${showtimeList}">
                <div th:class="${stMap.isSoldOut ? 'card bg-light border-danger h-100' : 'card h-100 shadow-sm'}">
                    <div class="card-body">
                        <h5 class="card-title text-success"><b th:text="${#temporals.format(stMap.showtime.startTime, 'dd/MM/yyyy')}"></b></h5>
                        <h4 class="font-weight-bold" th:text="${#temporals.format(stMap.showtime.startTime, 'HH:mm')}"></h4>
                        <p class="card-text text-muted">
                            Phòng: <span th:text="${stMap.showtime.room.name}"></span><br>
                            Ghế trống: <span th:text="${stMap.availableSeats}"></span>/<span th:text="${stMap.showtime.room.capacity}"></span>
                        </p>

                        <!-- CORE-08: Nếu hết vé thì hiện nút Hết vé -->
                        <div th:if="${stMap.isSoldOut}">
                            <button class="btn btn-outline-danger w-100" disabled>❌ Hết Vé</button>
                        </div>
                        <div th:unless="${stMap.isSoldOut}">
                            <a href="#" class="btn btn-primary w-100">🎟️ Đặt Ghế</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <a th:href="@{/}" class="btn btn-secondary mt-3">⬅ Quay lại danh sách phim</a>
    </div>
</body>
</html>
