<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>SmartCinema - SCBS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/scbs.css}" rel="stylesheet">
</head>
<body class="home-page">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 cinema-navbar">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/}">Smart<span>Cinema</span></a>

        <div class="cinema-nav-links d-none d-lg-flex">
            <a href="#movies">Trang chủ</a>
            <a href="#movies">Phim đang chiếu</a>
            <a href="#movies">Phim Sắp chieu</a>
        </div>

        <div class="ms-auto d-flex text-white align-items-center">
            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}" class="btn btn-outline-light me-2">Đăng nhập</a>
                <a th:href="@{/register}" class="btn btn-primary">Đăng ký</a>
            </div>

            <div sec:authorize="isAuthenticated()">
                <span class="me-3">Xin chao, <b class="text-warning" sec:authentication="name"></b>!</span>
                <span sec:authorize="hasAuthority('ROLE_ADMIN')">
                    <a th:href="@{/admin/dashboard}" class="btn btn-sm btn-warning me-2">Dashboard</a>
                </span>
                <span sec:authorize="hasAuthority('ROLE_STAFF')">
                    <a th:href="@{/staff/dashboard}" class="btn btn-sm btn-info me-2 text-white">Quầy vé</a>
                </span>
                <a th:href="@{/profile}" class="btn btn-sm btn-outline-light me-2">Hồ sơ</a>
                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger">Đăng xuất</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="container cinema-home mt-4">
    <section class="cinema-toolbar" id="movies">
        <div class="cinema-tabs">
            <button type="button" class="cinema-tab active">Đang chiếu</button>
            <button type="button" class="cinema-tab">Sắp chiếu</button>
        </div>

        <div class="cinema-search">
            <input type="search" id="movieSearch" class="form-control" placeholder="Tìm kiếm phim...">
        </div>
    </section>

    <section class="genre-filter mb-4">
        <span class="filter-icon">Filter</span>
        <button type="button" class="genre-chip active" data-genre="all">Tất cả</button>
        <button type="button"
                class="genre-chip"
                th:each="g : ${genres}"
                th:data-genre="${g.name}"
                th:text="${g.name}">Thể loại</button>
    </section>

    <div th:if="${#lists.isEmpty(movies)}" class="alert alert-info">
        Hiện tại chưa có film nào trong hệ thống.
        <span sec:authorize="hasAuthority('ROLE_ADMIN')">
            <a th:href="@{/admin/movies/create}" class="alert-link">Thêm phim ngay</a>.
        </span>
    </div>

    <section class="row mt-3 movie-grid" th:unless="${#lists.isEmpty(movies)}">
        <div class="col-sm-6 col-lg-3 col-xl-2 mb-4 movie-item"
             th:each="m : ${movies}"
             th:data-title="${m.title}"
             th:data-genre="${m.genre != null ? m.genre.name : 'Unknown'}">
            <article class="card h-100 shadow-sm border-0 movie-card-shell">
                <div class="movie-poster-wrap">
                    <span class="movie-showtime-badge movie-showtime-badge-active"
                          th:if="${upcomingShowtimeCountByMovie[m.id] != null and upcomingShowtimeCountByMovie[m.id] > 0}"
                          th:text="${'Đang có suất chiếu (' + upcomingShowtimeCountByMovie[m.id] + ' suất)'}">
                        Đang có suất chiếu
                    </span>
                    <span class="movie-showtime-badge movie-showtime-badge-inactive"
                          th:unless="${upcomingShowtimeCountByMovie[m.id] != null and upcomingShowtimeCountByMovie[m.id] > 0}">
                        Chưa có suất chiếu
                    </span>
                    <img th:if="${m.posterUrl != null and !#strings.isEmpty(m.posterUrl)}"
                         th:src="${m.posterUrl}"
                         class="card-img-top movie-poster"
                         th:alt="${m.title}">
                    <div th:unless="${m.posterUrl != null and !#strings.isEmpty(m.posterUrl)}"
                         class="movie-poster-placeholder d-flex align-items-center justify-content-center">
                        Poster
                    </div>
                    <a th:href="@{/movie/{id}/showtimes(id=${m.id})}" class="movie-hover-book">Dat ve</a>
                </div>
                <div class="card-body">
                    <h5 class="card-title text-truncate" th:text="${m.title}">Ten phim</h5>
                    <p class="card-text text-muted small"
                       th:text="${m.duration} + ' phút' + ' | ' + ${m.genre != null ? m.genre.name : 'Unknown'}">
                        120 phut | Thể loại
                    </p>
                    <a th:href="@{/movie/{id}/showtimes(id=${m.id})}" class="movie-book-link">Từ 75.000đ</a>
                </div>
            </article>
        </div>
    </section>
</main>

<script>
    (function () {
        var search = document.getElementById('movieSearch');
        var chips = document.querySelectorAll('.genre-chip');
        var items = document.querySelectorAll('.movie-item');
        var activeGenre = 'all';

        function normalize(value) {
            return (value || '').toLowerCase().trim();
        }

        function applyFilters() {
            var query = normalize(search ? search.value : '');
            items.forEach(function (item) {
                var title = normalize(item.getAttribute('data-title'));
                var genre = item.getAttribute('data-genre') || '';
                var genreMatches = activeGenre === 'all' || genre === activeGenre;
                var titleMatches = !query || title.indexOf(query) !== -1;
                item.classList.toggle('d-none', !(genreMatches && titleMatches));
            });
        }

        chips.forEach(function (chip) {
            chip.addEventListener('click', function () {
                chips.forEach(function (item) { item.classList.remove('active'); });
                chip.classList.add('active');
                activeGenre = chip.getAttribute('data-genre') || 'all';
                applyFilters();
            });
        });

        if (search) {
            search.addEventListener('input', applyFilters);
        }
    })();
</script>
</body>
</html>
