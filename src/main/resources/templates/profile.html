<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ cá nhân - SmartCinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/scbs.css}" rel="stylesheet">
</head>
<body class="profile-page">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 cinema-navbar">
    <div class="container">
        <a class="navbar-brand font-weight-bold" th:href="@{/}">Smart<span>Cinema</span></a>
        <div class="ms-auto d-flex align-items-center text-white">
            <span class="me-3">Xin chào, <b th:text="${user.fullName ?: user.username}"></b>!</span>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-sm btn-danger" type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>

<main class="container profile-shell">
    <div class="row g-4">
        <section class="col-lg-4">
            <div class="card profile-card">
                <div class="card-body text-center">
                    <img th:src="${'https://ui-avatars.com/api/?name=' + (user.fullName ?: user.username) + '&background=1f2937&color=ffffff'}" class="rounded-circle mb-3 profile-avatar" width="100" alt="Avatar">
                    <h4 th:text="${user.fullName ?: user.username}">Tài khoản</h4>
                    <p class="text-muted mb-3" th:text="${user.role}">Role</p>
                    <hr>
                    <div class="text-start">
                        <p class="mb-2"><strong>Email:</strong> <span th:text="${user.email}"></span></p>
                        <p class="mb-0"><strong>Số điện thoại:</strong> <span th:text="${user.phone ?: 'Chưa cập nhật'}"></span></p>
                    </div>
                    <hr>
                    <form th:action="@{/profile/update}" th:object="${profileForm}" method="post" class="text-start">
                        <div class="mb-3">
                            <label for="fullName" class="form-label"><strong>Họ tên</strong></label>
                            <input id="fullName" type="text" class="form-control"
                                   th:field="*{fullName}"
                                   th:classappend="${#fields.hasErrors('fullName')} ? ' is-invalid' : ''">
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label"><strong>Số điện thoại</strong></label>
                            <input id="phone" type="text" class="form-control"
                                   th:field="*{phone}"
                                   th:classappend="${#fields.hasErrors('phone')} ? ' is-invalid' : ''"
                                   placeholder="VD: 0912345678">
                            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Lưu thông tin</button>
                    </form>
                </div>
            </div>
        </section>

        <section class="col-lg-8">
            <div class="card profile-card">
                <div class="card-header">
                    <h5 class="mb-0">Lịch sử đặt vé</h5>
                </div>
                <div class="card-body">
                    <div th:if="${msgSuccess}" class="alert alert-success" th:text="${msgSuccess}"></div>
                    <div th:if="${msgError}" class="alert alert-danger" th:text="${msgError}"></div>

                    <div class="list-group">
                        <div th:each="b : ${bookings}" class="list-group-item mb-3 profile-booking-item">
                            <div class="d-flex w-100 justify-content-between">
                                <h6 class="mb-1 text-danger" th:text="${'Phim: ' + b.movieTitle}">Phim</h6>
                                <small th:class="${b.status != null and b.status.name() == 'CANCELLED' ? 'text-danger fw-bold' : 'text-success fw-bold'}"
                                       th:text="${b.status}">Trạng thái</small>
                            </div>
                            <p class="mb-1">
                                Suất chiếu:
                                <b th:text="${b.showtimeStart != null ? #temporals.format(b.showtimeStart, 'dd/MM/yyyy HH:mm') : 'N/A'}"></b>
                                <span th:text="${' | ' + b.roomName}"></span>
                            </p>
                            <p class="mb-1">
                                Ghế:
                                <b th:text="${#strings.listJoin(b.seatNames, ', ')}">A1</b>
                            </p>
                            <small>
                                Mã đơn: #<span th:text="${b.bookingId}"></span>
                                -
                                Tong tien: <b th:text="${b.totalPrice != null ? #numbers.formatInteger(b.totalPrice, 1, 'POINT') + ' VND' : '0 VND'}"></b>
                            </small>

                            <div class="mt-2 text-end" th:if="${b.cancellable}">
                                <form th:action="@{/booking/cancel}" method="post">
                                    <input type="hidden" name="bookingId" th:value="${b.bookingId}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Bạn có chắc chắn muốn hủy đơn hàng và giải phóng ghế?')">
                                        Hủy vé
                                    </button>
                                </form>
                            </div>
                            <div class="mt-2 text-end" th:if="${!b.cancellable and (b.status == null or b.status.name() != 'CANCELLED')}">
                                <small class="text-muted">Không thể hủy vé khi suất chiếu đã bắt đầu hoặc đã kết thúc.</small>
                            </div>
                        </div>

                        <div th:if="${#lists.isEmpty(bookings)}" class="text-center p-3 text-muted">
                            <em>Bạn chưa có lịch sử đặt vé nào.</em>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
</body>
</html>
